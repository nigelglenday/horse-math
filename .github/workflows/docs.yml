name: Deploy math.horse

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache MkDocs deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mkdocs-${{ hashFiles('.github/workflows/docs.yml') }}

      - name: Install MkDocs Material
        run: |
          pip install mkdocs-material

      - name: Stage docs into _site_src/
        run: bash scripts/build_docs.sh

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
