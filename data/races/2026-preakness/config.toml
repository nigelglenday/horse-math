# Sire pedigree bias — Preakness 9.5F is a touch shorter than Derby 10F,
# so pure stamina sires marginally less critical
[sire_bias]
[sire_bias.stamina]
sires = ["Curlin", "Tapit", "Liam s Map", "Constitution", "Into Mischief",
         "Sky Mesa", "Maxfield", "Blame", "Practical Joke"]
bonus = 8

[sire_bias.speed]
sires = ["Pavel", "Volatile", "Yaupon", "Connect", "Accelerate"]
penalty = 8
