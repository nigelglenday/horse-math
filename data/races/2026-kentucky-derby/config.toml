# 2026 Kentucky Derby — Race Configuration
#
# Everything race-specific lives here. The handicap engine in src/handicap.py
# is race-agnostic; it reads this config + the per-race CSVs in this directory.

[race]
name = "2026 Kentucky Derby"
track = "Churchill Downs"
date = "2026-05-02"
distance_furlongs = 10.0
surface = "dirt"
purse_k = 5000
field_cap = 20
exotic_takeout = 0.22

[scoring]
# Softmax temperature — higher = more peaked distribution
temperature = 0.075
# Bet flag thresholds
overlay_threshold = 1.25
fair_prob_threshold = 0.04

# Feature weights — must sum to 1.0
[weights]
last_beyer    = 0.18
top3_beyer    = 0.12
pace_fit      = 0.15
class_preps   = 0.12
how_won       = 0.07
distance_fit  = 0.10
connections   = 0.06
equipment     = 0.04
post          = 0.05
preferred_prep = 0.05
barn_pick     = 0.06

[pace]
# Whether today's race projects as a pace meltdown (favors closers)
meltdown_likely = true

# Equipment changes — first-time blinkers (per equipment notes on race card)
[equipment]
ft_blinkers = ["Litmus Test", "Chief Wallabee"]

# Post-position multiplier (applied post-softmax, then renormalized)
# Default = 1.00 means no penalty/bonus
[post_multiplier]
default = 1.00
ae_default = 0.50    # AE horses if NOT confirmed running

[post_multiplier.overrides]
"1" = 0.60     # rail death — 1 winner since 1975 (Ferdinand 1986)
"2" = 0.90
"3" = 0.90
"4" = 0.90
"16" = 0.90
"17" = 0.85
"18" = 0.85
"19" = 0.85
"20" = 0.85

# Class-of-prep scoring (used by class_preps feature)
[prep_class_score]
