# Preferred-prep bonus (race-specific narrative bias)
# For the Derby: Florida Derby winners get the bump.
# For the Preakness: this would shift to "Stk-KyDerby" (recent Derby winner/runner).
# For the Belmont: this would shift to "Stk-Preakness".
[preferred_prep]
race_class = "Stk-FlaDerby"
winner_score = 100
default_score = 50

# Public-overbet factors — fallback when live odds not available.
# Live odds (when present) reveal these directly, so this is rarely used.
[public_overbet]
"Renegade"        = 1.20
"Litmus Test"     = 1.25
"Further Ado"     = 1.15
"Chief Wallabee"  = 1.12
"Commandment"     = 1.10
"So Happy"        = 1.08
"Emerging Market" = 1.05
"Danon Bourbon"   = 1.05
"Wonder Dean"     = 1.05
"Corona de Oro"   = 1.03
"Robusta"         = 1.03

# Hand-coded barn-pick rules (race-specific entries)
# Captures stable signals like "Cox runs 3, his top jockey is on Further Ado"
[barn_pick]
default_score = 60

[[barn_pick.rules]]
trainer = "Brad Cox"
horse = "Further Ado"
jockey_contains = "Velazquez"
match_score = 90
trainer_other_score = 60   # other Cox runners that don't match

